description = "Verify that an active change has enough evidence to be considered complete."

prompt = """
Read the active change and workflow/state/.

Prefer delegating the evidence audit to @opsx-verifier for a scoped verification pass.

Use workflow/scripts/milestone-sync.sh --summary "<what changed>" for meaningful checkpoints. When the change is ready for completion, run workflow/scripts/post-impl-prepare.sh --summary "<what changed>" to create or refresh the canonical verification/report skeletons, then refine them and run workflow/scripts/post-impl-check.sh before treating the change as complete.
"""
